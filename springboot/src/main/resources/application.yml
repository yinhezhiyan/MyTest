server:
  port: ${SERVER_PORT:9090}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:system}?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  sql:
    init:
      mode: always
      data-locations: classpath:sql/demo_seed.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

fileBaseUrl: ${FILE_BASE_URL:http://localhost}

jwt:
  secret: ${JWT_SECRET:replace-with-env-secret}
  expire-hours: ${JWT_EXPIRE_HOURS:24}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
