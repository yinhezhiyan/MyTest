services:
  mysql:
    image: mysql:8.0
    container_name: mytest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: code2026
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: .
      dockerfile: springboot/Dockerfile
    container_name: mytest-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/code2026?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      FILE_BASE_URL: http://localhost:8088
      TZ: Asia/Shanghai

  web:
    build:
      context: .
      dockerfile: vue/Dockerfile
    container_name: mytest-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  mysql_data:
    name: mytest_mysql_data
